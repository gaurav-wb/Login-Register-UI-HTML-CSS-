<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form>
            <h2>Register</h2>

            <input type="text" placeholder="Username" required>  <!--This is for the Username-->
            <input type="email" placeholder="Email" required> <!--This is for the Email-->
            <input type="password" placeholder="Pasword" required>  <!--This is for the password -->
            <!-- now for the register button -->
             <button type="submit">Register</button>
            
             <!--Now if the user has an account, we can direct him to the login page by   -->
             <p>Already have an account ? <a href="index.html">Login</a></p>

        </form>
    </div>   
</body>
</html>
