<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container"> <!--This to create the center box-->
        <form>  <!--This is for the Login Form-->
            <h2>Login</h2>

            <input type="text" placeholder="Username" required> <!--this is for the username-->
            <input type="password" placeholder="Password" required> <!--this for the password-->
            <!-- now for the login button : -->
            <button type="submit">Login</button>
            <p>Don't have an account ? <a href="index2.html">Register</a></p> <!--if user does not have an account, click on register and gets directed to another page to register-->

        </form>
    </div>
</body>
</html>
